<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART SITE APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/site.css">
</head>
<body>
    <div class="page-shell">
        <nav class="navbar navbar-expand-lg smart-nav">
            <div class="container">
                <a class="navbar-brand fw-bold" href="{% url 'welcome' %}">SMART SITE APP</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#smartNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="smartNav">
                    <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                        <li class="nav-item"><a class="nav-link" href="{% url 'welcome' %}">Home</a></li>
                        {% if user.is_authenticated %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                            <li class="nav-item"><a class="nav-link" href="{% url 'survey' %}">Survey</a></li>
                            <li class="nav-item"><a class="nav-link" href="{% url 'reports' %}">Reports</a></li>
                            <li class="nav-item">
                                <form method="post" action="{% url 'logout' %}">
                                    {% csrf_token %}
                                    <button class="btn btn-outline-light btn-sm rounded-pill px-3" type="submit">Logout</button>
                                </form>
                            </li>
                        {% else %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
                            <li class="nav-item"><a class="btn btn-mint rounded-pill px-3" href="{% url 'register' %}">Register</a></li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container py-4 py-lg-5">
            {% if messages %}
                <div class="messages-stack">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }} border-0 shadow-sm">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
